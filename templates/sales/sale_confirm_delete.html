{% extends 'base.html' %}
{% block title %}Delete Sale{% endblock %}
{% block page_title %}Delete Sale{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body text-center p-4">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
        <h5 class="mt-3">Delete Sale {{ sale.invoice_number }}?</h5>
        <p class="text-muted small">Note: stock will NOT be automatically restored.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <a href="{% url 'sales:sale_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
