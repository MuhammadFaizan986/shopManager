{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="mb-3">
  <button type="button" class="btn btn-outline-secondary btn-sm" onclick="history.back()">
    <i class="bi bi-arrow-left me-1"></i> Back
  </button>
</div>
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header py-2 d-flex align-items-center gap-2">
        <i class="bi bi-grid text-primary"></i>
        <span class="fw-semibold">{{ title }}</span>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
          <div class="mb-4">
            <label for="id_name" class="form-label fw-semibold">Category Name <span class="text-danger">*</span></label>
            <input
              type="text"
              name="name"
              id="id_name"
              value="{{ form.name.value|default:'' }}"
              class="form-control form-control-lg {% if form.name.errors %}is-invalid{% endif %}"
              placeholder="e.g. Stationery"
              autofocus
            >
            {% if form.name.errors %}<div class="invalid-feedback">{{ form.name.errors.0 }}</div>{% endif %}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-check-lg me-1"></i>Save
            </button>
            <a href="{% url 'inventory:category_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
