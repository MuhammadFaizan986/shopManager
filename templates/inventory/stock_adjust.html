{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Adjust Stock{% endblock %}
{% block page_title %}Adjust Stock{% endblock %}
{% block content %}
<div class="mb-3">
  <button type="button" class="btn btn-outline-secondary btn-sm" onclick="history.back()">
    <i class="bi bi-arrow-left me-1"></i> Back
  </button>
</div>
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <p class="text-muted small">Manually correct stock levels.</p>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-warning">Apply Adjustment</button>
            <a href="{% url 'inventory:stock_history' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
