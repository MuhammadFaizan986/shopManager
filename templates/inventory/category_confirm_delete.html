{% extends 'base.html' %}
{% block title %}Delete Category{% endblock %}
{% block page_title %}Delete Category{% endblock %}
{% block content %}
<div class="mb-3">
  <button type="button" class="btn btn-outline-secondary btn-sm" onclick="history.back()">
    <i class="bi bi-arrow-left me-1"></i> Back
  </button>
</div>
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body text-center p-4">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
        <h5 class="mt-3">Delete "{{ category.name }}"?</h5>
        <p class="text-muted small">Products in this category will have their category removed (not deleted).</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <a href="{% url 'inventory:category_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
